# Weekly Supabase database backup to a GitHub Actions artifact.
# Requires two repository secrets:
#   SUPABASE_DB_URL  – postgres connection string (Settings → Database → URI)
#   SUPABASE_PROJECT_REF – your project reference slug (e.g. abcdefghijkl)
#
# For production use, replace the upload-artifact step with an upload to
# S3, Google Cloud Storage, or another durable store.

name: Weekly Database Backup

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 3:00 AM UTC
  workflow_dispatch:        # Allow manual runs from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql"
          pg_dump "$DB_URL" \
            --no-owner \
            --no-privileges \
            --schema=public \
            --file="backups/$FILENAME"
          echo "BACKUP_FILE=backups/$FILENAME" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
